<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new account for Personal Notes App.">
    <title>Register — Personal Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Logo / Header -->
            <div class="auth-header">
                <div class="auth-logo">📝</div>
                <h1>Create Account</h1>
                <p>Start organizing your thoughts today</p>
            </div>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <div class="input-icon-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="regUsername" placeholder="Choose a username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <div class="input-icon-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="regEmail" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="input-icon-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
                    </div>
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <div class="input-icon-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="password" id="regConfirmPassword" placeholder="Re-enter your password" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">✨ Create Account</button>
            </form>

            <!-- Footer Link -->
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="auth-link">Sign in</a></p>
            </div>

        </div>

        <!-- Floating decorative elements -->
        <div class="auth-decor auth-decor-1"></div>
        <div class="auth-decor auth-decor-2"></div>
        <div class="auth-decor auth-decor-3"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const toastContainer = document.getElementById('toastContainer');

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `<span>${icons[type] || '✅'}</span> ${message}`;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 3000);
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!username || !email || !password || !confirmPassword) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1200);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('Registration failed. Please try again.', 'error');
            }
        });

        // If already logged in, redirect to notes
        async function checkAuth() {
            try {
                const res = await fetch('/auth/me');
                if (res.ok) {
                    window.location.href = '/index.html';
                }
            } catch (err) { }
        }
        checkAuth();
    </script>

</body>
</html>
