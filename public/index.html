<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personal notes application to organize your thoughts, ideas, and tasks.">
    <title>Personal Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <!-- Top Bar with user info and signout -->
        <div class="top-bar">
            <div class="user-info">
                <span class="user-avatar">👤</span>
                <span class="user-name" id="userName">User</span>
            </div>
            <button class="btn btn-signout" id="signoutBtn">🚪 Sign Out</button>
        </div>

        <!-- Header -->
        <header class="app-header">
            <h1>📝 Personal Notes</h1>
            <p>Capture your thoughts, organize your ideas</p>
        </header>

        <!-- Add Note Form -->
        <section class="note-form-section">
            <h2><span class="icon">✏️</span> Create a New Note</h2>
            <form id="noteForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="noteTitle">Title</label>
                        <input type="text" id="noteTitle" placeholder="Enter note title..." required>
                    </div>
                    <div class="form-group">
                        <label for="noteCategory">Category</label>
                        <select id="noteCategory">
                            <option value="Personal">Personal</option>
                            <option value="Work">Work</option>
                            <option value="Study">Study</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="noteContent">Content</label>
                        <textarea id="noteContent" placeholder="Write your note here..." required></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="addNoteBtn">🚀 Add Note</button>
            </form>
        </section>

        <!-- Notes Display -->
        <section class="notes-section">
            <div class="notes-section-header">
                <h2><span class="icon">📋</span> Your Notes</h2>
                <span class="note-count" id="noteCount">0 notes</span>
            </div>
            <div class="notes-grid" id="notesGrid">
                <!-- Notes will be rendered here -->
            </div>
        </section>

    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2><span class="icon">✏️</span> Edit Note</h2>
            <input type="hidden" id="editNoteId">
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="editTitle">Title</label>
                <input type="text" id="editTitle" placeholder="Enter note title..." required>
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="editCategory">Category</label>
                <select id="editCategory">
                    <option value="Personal">Personal</option>
                    <option value="Work">Work</option>
                    <option value="Study">Study</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editContent">Content</label>
                <textarea id="editContent" placeholder="Write your note here..." required></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                <button class="btn btn-primary" id="saveEditBtn">💾 Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ===== Auth Check — redirect to login if not logged in =====
        async function checkAuth() {
            try {
                const res = await fetch('/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('userName').textContent = data.username;
                } else {
                    window.location.href = '/login.html';
                }
            } catch (err) {
                window.location.href = '/login.html';
            }
        }
        checkAuth();

        // ===== Signout =====
        document.getElementById('signoutBtn').addEventListener('click', async () => {
            try {
                await fetch('/auth/logout', { method: 'POST' });
                window.location.href = '/login.html';
            } catch (err) {
                window.location.href = '/login.html';
            }
        });

        // ===== DOM Elements =====
        const noteForm = document.getElementById('noteForm');
        const noteTitle = document.getElementById('noteTitle');
        const noteContent = document.getElementById('noteContent');
        const noteCategory = document.getElementById('noteCategory');
        const notesGrid = document.getElementById('notesGrid');
        const noteCount = document.getElementById('noteCount');
        const editModal = document.getElementById('editModal');
        const editNoteId = document.getElementById('editNoteId');
        const editTitle = document.getElementById('editTitle');
        const editContent = document.getElementById('editContent');
        const editCategory = document.getElementById('editCategory');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const saveEditBtn = document.getElementById('saveEditBtn');
        const toastContainer = document.getElementById('toastContainer');

        // ===== Toast Notification =====
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `<span>${icons[type] || '✅'}</span> ${message}`;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 3000);
        }

        // ===== Format Date =====
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ===== Get Badge Class =====
        function getBadgeClass(category) {
            const map = {
                'Personal': 'badge-personal',
                'Work': 'badge-work',
                'Study': 'badge-study'
            };
            return map[category] || 'badge-personal';
        }

        // ===== Fetch & Render All Notes =====
        async function fetchNotes() {
            try {
                const res = await fetch('/notes');
                if (res.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                const notes = await res.json();
                renderNotes(notes);
            } catch (err) {
                showToast('Failed to load notes', 'error');
            }
        }

        function renderNotes(notes) {
            if (!notes || notes.length === 0) {
                notesGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <h3>No notes yet</h3>
                        <p>Create your first note using the form above!</p>
                    </div>
                `;
                noteCount.textContent = '0 notes';
                return;
            }

            // Sort by newest first
            notes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            noteCount.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

            notesGrid.innerHTML = notes.map((note, index) => `
                <div class="note-card" style="animation-delay: ${index * 0.05}s">
                    <div class="note-card-header">
                        <h3 class="note-card-title">${escapeHtml(note.title)}</h3>
                        <span class="category-badge ${getBadgeClass(note.category)}">${escapeHtml(note.category)}</span>
                    </div>
                    <p class="note-card-content">${escapeHtml(note.content)}</p>
                    <div class="note-card-footer">
                        <span class="note-date">🕐 ${formatDate(note.createdAt)}</span>
                        <div class="note-actions">
                            <button class="btn-icon btn-edit" onclick="openEditModal('${note._id}', '${escapeAttr(note.title)}', '${escapeAttr(note.content)}', '${escapeAttr(note.category)}')" title="Edit">✏️</button>
                            <button class="btn-icon btn-delete" onclick="deleteNote('${note._id}')" title="Delete">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== Escape HTML to prevent XSS =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '');
        }

        // ===== Add Note =====
        noteForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = noteTitle.value.trim();
            const content = noteContent.value.trim();
            const category = noteCategory.value;

            if (!title || !content) {
                showToast('Please fill in all required fields', 'error');
                return;
            }

            try {
                const res = await fetch('/notes/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, category })
                });
                const data = await res.text();
                showToast(data, 'success');
                noteForm.reset();
                fetchNotes();
            } catch (err) {
                showToast('Failed to add note', 'error');
            }
        });

        // ===== Delete Note =====
        async function deleteNote(id) {
            if (!confirm('Are you sure you want to delete this note?')) return;

            try {
                const res = await fetch(`/notes/delete/${id}`, { method: 'DELETE' });
                const data = await res.text();
                showToast(data, 'success');
                fetchNotes();
            } catch (err) {
                showToast('Failed to delete note', 'error');
            }
        }

        // ===== Edit Modal =====
        function openEditModal(id, title, content, category) {
            editNoteId.value = id;
            editTitle.value = title;
            editContent.value = content;
            editCategory.value = category;
            editModal.classList.add('active');
        }

        function closeEditModal() {
            editModal.classList.remove('active');
        }

        cancelEditBtn.addEventListener('click', closeEditModal);

        // Close modal on overlay click
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) closeEditModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeEditModal();
        });

        // ===== Save Edit =====
        saveEditBtn.addEventListener('click', async () => {
            const id = editNoteId.value;
            const title = editTitle.value.trim();
            const content = editContent.value.trim();
            const category = editCategory.value;

            if (!title || !content) {
                showToast('Please fill in all required fields', 'error');
                return;
            }

            try {
                const res = await fetch(`/notes/update/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, category })
                });
                const data = await res.json();
                showToast('Note updated successfully', 'success');
                closeEditModal();
                fetchNotes();
            } catch (err) {
                showToast('Failed to update note', 'error');
            }
        });

        // ===== Load Notes on Page Load =====
        fetchNotes();
    </script>

</body>
</html>
